<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="index.js"></script>
</head>
<body>
    <div class="main">
        <div class="container">
            <div class="team" id="home">
                <h1>HOME</h1>
                <div class="punkte">
                    <p id="punkte-home">0</p>
                </div>
                <div class="button-container">
                    <button class="add-btn" onclick="addHome(1)">+1</button>
                    <button class="add-btn" onclick="addHome(2)">+2</button>
                    <button class="add-btn" onclick="addHome(3)">+3</button>
                </div>
            </div>
            <div class="team" id="guest">
                <h1>GUEST</h1>
                <div class="punkte">
                    <p id="punkte-guest">0</p>
                </div>
                <div class="button-container">
                    <button class="add-btn" onclick="addGuest(1)">+1</button>
                    <button class="add-btn" onclick="addGuest(2)">+2</button>
                    <button class="add-btn" onclick="addGuest(3)">+3</button>
                </div>
            </div>
        </div>
        <button id="new-game-btn" onclick="newGame()">NEW GAME</button>
    </div>
</body>
</html>
